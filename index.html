<!DOCTYPE html>
<html>
<head>
    <title>Utility DXF Extractor</title>

    <link
        href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css"
        rel="stylesheet"
    />

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h1 {
            padding: 10px;
            margin: 0;
        }

        #map {
            width: 100%;
            height: 90vh;
        }
    </style>
</head>
<body>

<h1>Utility DXF Extractor</h1>

<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>

<script>
const map = new maplibregl.Map({
    container: 'map',

    style: {
        version: 8,
        sources: {
            osm: {
                type: 'raster',
                tiles: [
                    'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
                ],
                tileSize: 256,
                attribution: '© OpenStreetMap'
            }
        },
        layers: [
            {
                id: 'osm',
                type: 'raster',
                source: 'osm'
            }
        ]
    },

    center: [-97.7431, 30.2672],
    zoom: 8
});
</script>

</body>
</html>
